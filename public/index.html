        .nesne-label {

            font-size: 10px; padding: 2px 6px; border-radius: 4px;

        #kamera-panel {

        #kamera-panel-baslik {

function getNesneConfig(nesne) {
    const key = Object.keys(NESNE_DB).find(k =>
        nesne.toLowerCase() === k.toLowerCase() ||
        nesne.toLowerCase().includes(k.toLowerCase())
    );
    return NESNE_DB[key] || { emoji: '📍', anim: 'pulseAnim', renk: '#ffaa00', hiz: 2.0, tehlike: false };
}

function markerElementOlustur(nesne, mesafe) {
    const config = getNesneConfig(nesne);
    const el = document.createElement('div');
    el.className = 'nesne-marker';

    const ikon = document.createElement('div');
    ikon.className = 'nesne-ikon';
    ikon.textContent = config.emoji;
    if (config.hiz !== 999) {
        ikon.style.animation = `${config.anim} ${config.hiz}s ease-in-out infinite`;
    }
    ikon.style.filter = `drop-shadow(0 0 8px ${config.renk})`;

    const label = document.createElement('div');
    label.className = `nesne-label ${config.tehlike ? 'tehlikeli' : ''}`;
    label.textContent = `${nesne}${mesafe > 0 ? ' · ' + mesafe + 'cm' : ''}`;

    el.appendChild(ikon);
    el.appendChild(label);
    return el;
}

const nesneMarkerlar = new Map();
let tespitSayisi = 0;

function lerp(a, b, t) { return a + (b - a) * t; }

function nesneEkleVeyaGuncelle(data) {
    if (!data.lat || !data.lng || !data.nesne) return;

    const lat = parseFloat(data.lat);
    const lng = parseFloat(data.lng);
    const nesne = data.nesne;
    const mesafe = data.mesafe || 0;
    const config = getNesneConfig(nesne);

    let mevcutKey = null;
    for (const [key, markerData] of nesneMarkerlar) {
        if (key.startsWith(nesne + '_')) {
            const dist = Math.abs(markerData.lat - lat) + Math.abs(markerData.lng - lng);
            if (dist < 0.0005) { mevcutKey = key; break; }
        }
    }

    if (mevcutKey && nesneMarkerlar.has(mevcutKey)) {
        const existing = nesneMarkerlar.get(mevcutKey);
        const marker = existing.marker;
        let progress = 0;
        const startLat = existing.lat;
        const startLng = existing.lng;
        const animInterval = setInterval(() => {
            progress += 0.05;
            if (progress >= 1) { progress = 1; clearInterval(animInterval); }
            marker.setLngLat([lerp(startLng, lng, progress), lerp(startLat, lat, progress)]);
        }, 16);
        existing.lat = lat;
        existing.lng = lng;
        existing.zaman = Date.now();
    } else {
        const key = `${nesne}_${Date.now()}`;
        const el = markerElementOlustur(nesne, mesafe);
        const marker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
            .setLngLat([lng, lat]).addTo(map);
        nesneMarkerlar.set(key, { marker, lat, lng, zaman: Date.now() });
        tespitSayisi++;
        document.getElementById('tespit-sayisi').textContent = tespitSayisi;
    }

    for (const [key, d] of nesneMarkerlar) {
        if (Date.now() - d.zaman > 30000) { d.marker.remove(); nesneMarkerlar.delete(key); }
    }
}

// OSM verileri için değişkenler
const osmMarkerlar = new Map();
let sonOsmSorguLat = 0;
let sonOsmSorguLng = 0;
let sonOsmSorguZamani = 0;

// OSM nesne konfigürasyonu
const OSM_KONFIG = {
    'crossing':        { emoji: '🚸', renk: '#ffffff', baslik: 'Yaya Geçidi' },
    'lowered':         { emoji: '♿', renk: '#4488ff', baslik: 'Alçaltılmış Kaldırım' },
    'tactile_paving':  { emoji: '⬛', renk: '#ffff00', baslik: 'Taktil Zemin' },
    'bus_stop':        { emoji: '🚌', renk: '#00aaff', baslik: 'Otobüs Durağı' },
    'bench':           { emoji: '🪑', renk: '#888844', baslik: 'Bank' },
    'traffic_signals': { emoji: '🚦', renk: '#ffff00', baslik: 'Trafik Işığı' },
    'raised':          { emoji: '⚠️', renk: '#ff6600', baslik: 'Yüksek Kaldırım' },
};

function osmTipBelirle(node) {
    const t = node.tags || {};
    if (t.highway === 'crossing') return 'crossing';
    if (t.kerb === 'lowered') return 'lowered';
    if (t.tactile_paving === 'yes') return 'tactile_paving';
    if (t.highway === 'bus_stop') return 'bus_stop';
    if (t.amenity === 'bench') return 'bench';
    if (t.highway === 'traffic_signals') return 'traffic_signals';
    if (t.kerb === 'raised') return 'raised';
    return null;
}

function osmMarkerOlustur(tip) {
    const konfig = OSM_KONFIG[tip];
    const el = document.createElement('div');
    el.style.cssText = `
        display: flex; flex-direction: column; align-items: center;
        pointer-events: all; cursor: pointer;
    `;
    el.innerHTML = `
        <div style="font-size:22px;filter:drop-shadow(0 0 6px ${konfig.renk});opacity:0.85">${konfig.emoji}</div>
        <div style="background:rgba(0,0,0,0.75);color:${konfig.renk};font-size:9px;
                    padding:1px 5px;border-radius:3px;border:1px solid ${konfig.renk};
                    white-space:nowrap;margin-top:1px;font-family:monospace">${konfig.baslik}</div>
    `;
    return el;
}

async function osmVeriCek(lat, lng) {
    const suAn = Date.now();
    // 30 saniyede bir ve 50 metreden fazla hareket edince sorgula
    const mesafeFark = Math.abs(lat - sonOsmSorguLat) + Math.abs(lng - sonOsmSorguLng);
    if (suAn - sonOsmSorguZamani < 30000 && mesafeFark < 0.0005) return;

    sonOsmSorguLat = lat;
    sonOsmSorguLng = lng;
    sonOsmSorguZamani = suAn;

    try {
        const resp = await fetch(`http://192.168.137.1:3000/osm-verisi?lat=${lat}&lng=${lng}&yari_cap=200`);
        const data = await resp.json();

        if (!data.elements) return;

        // Mevcut OSM markerları temizle
        for (const [key, m] of osmMarkerlar) {
            m.remove();
            osmMarkerlar.delete(key);
        }

        // Yeni markerları ekle
        data.elements.forEach(node => {
            const tip = osmTipBelirle(node);
            if (!tip) return;

            const key = `osm_${node.id}`;
            const el = osmMarkerOlustur(tip);
            const konfig = OSM_KONFIG[tip];

            const popup = new mapboxgl.Popup({ offset: 25, closeButton: false })
                .setHTML(`
                    <div style="background:#111;color:#0f0;padding:6px 10px;
                                border:1px solid #0f0;border-radius:4px;font-family:monospace">
                        <div style="font-size:20px;text-align:center">${konfig.emoji}</div>
                        <div style="font-weight:bold;color:${konfig.renk}">${konfig.baslik}</div>
                        <div style="color:#555;font-size:10px">OpenStreetMap verisi</div>
                    </div>
                `);

            const marker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
                .setLngLat([node.lon, node.lat])
                .setPopup(popup)
                .addTo(map);

            osmMarkerlar.set(key, marker);
        });

        console.log(`OSM: ${data.elements.length} nokta yüklendi`);
    } catch (e) {
        console.log('OSM sorgu hatası:', e);
    }
}

// Yakın OSM noktalarını sesli uyar
function osmYakinlikKontrol(kullaniciLat, kullaniciLng) {
    for (const [key, marker] of osmMarkerlar) {
        const pos = marker.getLngLat();
        const dLat = (kullaniciLat - pos.lat) * 111000;
        const dLng = (kullaniciLng - pos.lng) * 111000 * Math.cos(kullaniciLat * Math.PI / 180);
        const mesafe = Math.sqrt(dLat * dLat + dLng * dLng);

        if (mesafe < 15 && !marker._uyarildi) {
            marker._uyarildi = true;
            // Marker tipini bul
            const el = marker.getElement();
            const baslikEl = el.querySelector('div div:last-child');
            if (baslikEl) {
                const baslik = baslikEl.textContent;
                // TTS için Android'e gönder — harita üzerinden bilgi ver
                const bar = document.getElementById('engel-bar');
                bar.style.display = 'block';
                bar.className = 'dikkat';
                bar.textContent = `📍 ${baslik} — ${Math.round(mesafe)} metre`;
                setTimeout(() => bar.style.display = 'none', 4000);
            }
            // 2 dakika sonra uyarıyı sıfırla (aynı noktadan tekrar geçince uyarsın)
            setTimeout(() => { marker._uyarildi = false; }, 120000);
        }
    }
}

socket.on('canli_kamera', (data) => {
    if (!kameraPanelAcik) return;
    const canvas = document.getElementById('kamera-canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
        ctx.drawImage(img, 0, 0, 320, 320);
        (data.kutular || []).forEach(k => {
            ctx.strokeStyle = k.tehlike ? '#ff3300' : '#00ff88';
            ctx.strokeRect(k.x, k.y, k.w, k.h);
        });
    };
    img.src = 'data:image/jpeg;base64,' + data.goruntu;
});

// Rota değişkenleri
let hedefLat = null;
let hedefLng = null;
let hedefMarker = null;
let rotaAktif = false;
let rotaAdimlar = [];
let mevcutAdimIndex = 0;
let sonRotaKontrolZamani = 0;

// Haritaya tıklayarak hedef seç
map.on('click', (e) => {
    if (rotaAktif) return;
    hedefLat = e.lngLat.lat;
    hedefLng = e.lngLat.lng;

    if (hedefMarker) hedefMarker.remove();

    const el = document.createElement('div');
    el.style.cssText = `
        font-size: 28px;
        filter: drop-shadow(0 0 8px #ff3300);
    `;
    el.textContent = '📍';

    hedefMarker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
        .setLngLat([hedefLng, hedefLat])
        .addTo(map);

    document.getElementById('rota-input').value = `${hedefLat.toFixed(5)}, ${hedefLng.toFixed(5)}`;
});

async function adresdenKoordinat(adres) {
    const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(adres)}.json?access_token=${mapboxgl.accessToken}&country=tr&language=tr`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.features && data.features.length > 0) {
        const [lng, lat] = data.features[0].center;
        return { lat, lng };
    }
    return null;
}

async function rotaBaslat() {
    const input = document.getElementById('rota-input').value.trim();

    // Koordinat mı yoksa adres mi?
    if (input && !hedefLat) {
        const koordinatlar = input.split(',');
        if (koordinatlar.length === 2 && !isNaN(koordinatlar[0]) && !isNaN(koordinatlar[1])) {
            hedefLat = parseFloat(koordinatlar[0]);
            hedefLng = parseFloat(koordinatlar[1]);
        } else {
            // Adres araması yap
            const koordinat = await adresdenKoordinat(input);
            if (!koordinat) {
                alert('Adres bulunamadı!');
                return;
            }
            hedefLat = koordinat.lat;
            hedefLng = koordinat.lng;
        }
    }

    if (!hedefLat || !hedefLng) {
        alert('Lütfen hedef seçin!');
        return;
    }

    if (sonLat === 0 && sonLng === 0) {
        alert('GPS konumu bekleniyor...');
        return;
    }

    await rotaHesapla();
}

// Mevcut konum değişkeni (harita_guncelle'den gelecek)
let sonLat = 0, sonLng = 0;

async function rotaHesapla() {
    const url = `https://api.mapbox.com/directions/v5/mapbox/walking/${sonLng},${sonLat};${hedefLng},${hedefLat}?steps=true&language=tr&voice_instructions=true&banner_instructions=true&access_token=${mapboxgl.accessToken}`;

    try {
        const resp = await fetch(url);
        const data = await resp.json();

        if (!data.routes || data.routes.length === 0) {
            alert('Rota bulunamadı!');
            return;
        }

        const rota = data.routes[0];
        rotaAdimlar = rota.legs[0].steps;
        mevcutAdimIndex = 0;
        rotaAktif = true;

        // Mesafe ve süre göster
        const mesafeKm = (rota.distance / 1000).toFixed(1);
        const sureDk = Math.round(rota.duration / 60);
        document.getElementById('rota-mesafe').textContent = `${mesafeKm} km`;
        document.getElementById('rota-sure').textContent = `~${sureDk} dk`;
        document.getElementById('rota-bilgi').style.display = 'block';

        // Haritada rota çizgisi çiz
        rotaCizgisiGoster(rota.geometry);

        // İlk adımı söyle
        rotaAdimSoyле(0);

    } catch (e) {
        alert('Rota hesaplama hatası: ' + e.message);
    }
}

function rotaCizgisiGoster(geometry) {
    // Eski rotayı temizle
    if (map.getLayer('rota-cizgi')) map.removeLayer('rota-cizgi');
    if (map.getSource('rota')) map.removeSource('rota');

    map.addSource('rota', {
        type: 'geojson',
        data: { type: 'Feature', geometry }
    });

    map.addLayer({
        id: 'rota-cizgi',
        type: 'line',
        source: 'rota',
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: {
            'line-color': '#00ff88',
            'line-width': 5,
            'line-opacity': 0.8,
            'line-dasharray': [2, 1]
        }
    });
}

function rotaAdimSoyле(index) {
    if (index >= rotaAdimlar.length) {
        document.getElementById('rota-adim').textContent = '🎯 Hedefe ulaştınız!';
        rotaAktif = false;
        return;
    }

    const adim = rotaAdimlar[index];
    const talimat = adimTurkcelestir(adim.maneuver.instruction || '');
    const mesafe = adim.distance < 1000
        ? `${Math.round(adim.distance)} metre`
        : `${(adim.distance / 1000).toFixed(1)} kilometre`;

    const metin = `${talimat} — ${mesafe}`;
    document.getElementById('rota-adim').textContent = metin;

    // TTS ile söyle
    if (window.speechSynthesis) {
        const utterance = new SpeechSynthesisUtterance(metin);
        utterance.lang = 'tr-TR';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }
}

function adimTurkcelestir(talimat) {
    return talimat
        .replace('Turn left', 'Sola dönün')
        .replace('Turn right', 'Sağa dönün')
        .replace('Continue straight', 'Düz devam edin')
        .replace('Head', 'İlerleyin')
        .replace('north', 'kuzeye')
        .replace('south', 'güneye')
        .replace('east', 'doğuya')
        .replace('west', 'batıya')
        .replace('Arrive at', 'Hedefinize ulaştınız')
        .replace('on the left', 'solunuzda')
        .replace('on the right', 'sağınızda');
}

function rotaAdimKontrol(lat, lng) {
    if (!rotaAktif || rotaAdimlar.length === 0) return;
    if (Date.now() - sonRotaKontrolZamani < 3000) return;
    sonRotaKontrolZamani = Date.now();

    if (mevcutAdimIndex >= rotaAdimlar.length) return;

    const adim = rotaAdimlar[mevcutAdimIndex];
    const hedefLoc = adim.maneuver.location;
    const dLat = (lat - hedefLoc[1]) * 111000;
    const dLng = (lng - hedefLoc[0]) * 111000 * Math.cos(lat * Math.PI / 180);
    const mesafe = Math.sqrt(dLat * dLat + dLng * dLng);

    // 20 metre yaklaşınca sonraki adıma geç
    if (mesafe < 20) {
        mevcutAdimIndex++;
        rotaAdimSoyле(mevcutAdimIndex);
    }
}

function rotaIptal() {
    rotaAktif = false;
    rotaAdimlar = [];
    mevcutAdimIndex = 0;
    hedefLat = null;
    hedefLng = null;

    if (hedefMarker) { hedefMarker.remove(); hedefMarker = null; }
    if (map.getLayer('rota-cizgi')) map.removeLayer('rota-cizgi');
    if (map.getSource('rota')) map.removeSource('rota');

    document.getElementById('rota-input').value = '';
    document.getElementById('rota-bilgi').style.display = 'none';
    document.getElementById('rota-adim').textContent = '';
}
</script>
